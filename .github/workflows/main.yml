name: CI

on:
  merge_group:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Format Check
        run: npm run prettier.dry-run
      - name: Run Lint Check
        run: npm run lint
      - name: Build project
        run: npm run build
      - name: Run Tests
        run: npm test -- --no-watch

      # Verify that the Example Project Builds
      - name: Install Example Project Dependencies
        working-directory: './example'
        run: npm ci

      - name: Build Example Project
        working-directory: './example'
        run: npm run build

      - name: Verify No Files Have Changed
        working-directory: './example'
        # here we check that there are no changed / new files.
        # we use `git status` and check if there are more than 0 lines in the output.
        run: |
          if [[ $(git status --short | wc -l) -ne 0 ]]; then
            STATUS=$(git status --verbose); 
            printf "%s" "$STATUS";
            git diff | cat;
            exit 1;
          fi
        shell: bash